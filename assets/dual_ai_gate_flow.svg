<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500"><rect x="0" y="0" width="600" height="500" rx="0" fill="#F8FAFC" stroke="none" stroke-width="0" /><text x="300" y="28" font-family="Arial,sans-serif" font-size="16" fill="#1E293B" text-anchor="middle" font-weight="700">Dual-AI Gate — Verification Flow</text><rect x="180" y="55" width="240" height="55" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" /><text x="300" y="78" font-family="Arial,sans-serif" font-size="12" fill="#1E40AF" text-anchor="middle" font-weight="700">Generator (e.g. DeepSeek)</text><text x="300" y="95" font-family="Arial,sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Creates designs, writes code, captures knowledge</text><line x1="300" y1="110" x2="300" y2="140" stroke="#2563EB" stroke-width="2" /><rect x="230" y="143" width="140" height="35" rx="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5" /><text x="300" y="166" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="700">Generated Output</text><line x1="300" y1="178" x2="300" y2="210" stroke="#64748B" stroke-width="2" /><polygon points="300,215 380,275 300,335 220,275" fill="#F0FDF4" stroke="#16A34A" stroke-width="2" /><text x="300" y="262" font-family="Arial,sans-serif" font-size="9" fill="#166534" text-anchor="middle" font-weight="700">Qwen</text><text x="300" y="278" font-family="Arial,sans-serif" font-size="9" fill="#166534" text-anchor="middle" font-weight="700">Verification</text><text x="300" y="296" font-family="Arial,sans-serif" font-size="7" fill="#16A34A" text-anchor="middle">Independent audit</text><line x1="380" y1="275" x2="470" y2="275" stroke="#16A34A" stroke-width="2" /><text x="425" y="268" font-family="Arial,sans-serif" font-size="9" fill="#16A34A" text-anchor="middle" font-weight="700">PASS</text><rect x="470" y="248" width="110" height="54" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" /><text x="525" y="272" font-family="Arial,sans-serif" font-size="10" fill="#166534" text-anchor="middle" font-weight="700">Downstream</text><text x="525" y="290" font-family="Arial,sans-serif" font-size="8" fill="#16A34A" text-anchor="middle">Flow</text><line x1="220" y1="275" x2="130" y2="275" stroke="#DC2626" stroke-width="2" /><text x="175" y="268" font-family="Arial,sans-serif" font-size="9" fill="#DC2626" text-anchor="middle" font-weight="700">FAIL</text><rect x="20" y="248" width="110" height="54" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" /><text x="75" y="268" font-family="Arial,sans-serif" font-size="9" fill="#991B1B" text-anchor="middle" font-weight="700">Fuse Board</text><text x="75" y="286" font-family="Arial,sans-serif" font-size="7" fill="#DC2626" text-anchor="middle">Intercept</text><path d="M75,248 C75,80 150,80 180,82" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="5,3" fill="none" /><text x="115" y="155" font-family="Arial,sans-serif" font-size="7" fill="#DC2626" text-anchor="middle">Re-generate</text><rect x="130" y="390" width="340" height="60" rx="6" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5" /><text x="300" y="410" font-family="Arial,sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-weight="700">Statistical Guarantee</text><text x="300" y="430" font-family="Arial,sans-serif" font-size="11" fill="#D97706" text-anchor="middle" font-weight="700">P(system err) = P(Generator err) x P(Evaluator err)</text><text x="300" y="447" font-family="Arial,sans-serif" font-size="7.5" fill="#F59E0B" text-anchor="middle">e.g. 0.1 x 0.1 = 1% dual-hallucination rate</text><rect x="130" y="460" width="340" height="28" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="0.8" /><text x="300" y="479" font-family="Arial,sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Fallback: Haiku if Qwen unavailable; both down: log degradation, default allow</text></svg>